name: NHL Betting Signal
on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  generate-signal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Installer dependances
        run: pip install -r requirements.txt
      - name: Archiver signal de la veille (si pas deja fait)
        run: |
          if [ -f docs/signal.json ]; then
            mkdir -p docs/archive
            SIGNAL_DATE=$(python3 -c "import json; d=json.load(open('docs/signal.json')); print(d.get('date',''))" 2>/dev/null || echo "")
            if [ -n "$SIGNAL_DATE" ]; then
              ARCHIVE=docs/archive/signal_${SIGNAL_DATE}.json
              if [ ! -f "$ARCHIVE" ]; then
                cp docs/signal.json "$ARCHIVE"
                echo "Signal archive: signal_${SIGNAL_DATE}.json"
              else
                echo "Archive existe deja: signal_${SIGNAL_DATE}.json — skip"
              fi
            fi
          fi
      - name: Resoudre bets de la veille
        run: |
          YESTERDAY=$(TZ=America/Toronto date -d "yesterday" +%Y-%m-%d 2>/dev/null || TZ=America/Toronto date -v-1d +%Y-%m-%d)
          cd src && python backtester.py "$YESTERDAY"
      - name: Generer le signal
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          GH_WORKFLOW_TOKEN: ${{ secrets.GH_WORKFLOW_TOKEN }}
        run: |
          cd src
          python signal.py
      - name: Commit et push
        run: |
          git config --global user.name "NHL Bot"
          git config --global user.email "bot@nhl.local"
          git add docs/
          git diff --staged --quiet || git commit -m "Signal $(date +'%Y-%m-%d')"
          git pull --rebase origin main
          git push
