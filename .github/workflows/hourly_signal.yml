name: NHL Signal - Actualisation toutes les 2h
on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  refresh-signal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Installer dependances
        run: pip install -r requirements.txt
      - name: Archiver signal si changement de jour ET
        run: |
          if [ -f docs/signal.json ]; then
            mkdir -p docs/archive
            SIGNAL_DATE=$(python3 -c "import json; d=json.load(open('docs/signal.json')); print(d.get('date',''))" 2>/dev/null || echo "")
            TODAY_ET=$(TZ=America/Toronto date +%Y-%m-%d)
            if [ -n "$SIGNAL_DATE" ] && [ "$SIGNAL_DATE" != "$TODAY_ET" ]; then
              ARCHIVE=docs/archive/signal_${SIGNAL_DATE}.json
              if [ ! -f "$ARCHIVE" ]; then
                cp docs/signal.json "$ARCHIVE"
                echo "Archive cree: $ARCHIVE"
              else
                echo "Archive existe deja: $ARCHIVE"
              fi
            fi
          fi
      - name: Resoudre bets de la veille si nouvelle journee ET
        run: |
          SIGNAL_DATE=$(python3 -c "import json; d=json.load(open('docs/signal.json')); print(d.get('date',''))" 2>/dev/null || echo "")
          TODAY_ET=$(TZ=America/Toronto date +%Y-%m-%d)
          if [ -n "$SIGNAL_DATE" ] && [ "$SIGNAL_DATE" != "$TODAY_ET" ]; then
            echo "Nouvelle journee ET ($SIGNAL_DATE -> $TODAY_ET): resolution des bets"
            cd src && python backtester.py "$SIGNAL_DATE"
          else
            echo "Meme journee ET ($TODAY_ET): pas de resolution"
          fi
      - name: Generer le signal
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          GH_WORKFLOW_TOKEN: ${{ secrets.GH_WORKFLOW_TOKEN }}
        run: |
          cd src
          python signal.py
      - name: Commit et push
        run: |
          git config --global user.name "NHL Bot"
          git config --global user.email "bot@nhl.local"
          git add docs/signal.json docs/index.html docs/results.json docs/archive/
          git diff --staged --quiet || git commit -m "Signal refresh $(date +'%Y-%m-%d %H:%M')"
          # Rebase sur remote avec strategy "theirs" pour les conflits sur fichiers bot
          git pull --rebase -X theirs origin main || (git rebase --abort && git pull --ff-only origin main)
          git push || (git pull --rebase -X theirs origin main && git push)
